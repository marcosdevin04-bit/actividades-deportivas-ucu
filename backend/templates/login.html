<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Iniciar sesión — Actividades Deportivas UCU</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="login-body">
  <div class="login-wrap">
    <div class="login-brand">UCU <span>Deportes</span></div>
    <div class="login-sub">Sistema de gestión de actividades deportivas universitarias</div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form class="login-form" method="post">
      <label>Correo electrónico
        <input type="email" name="correo" required autofocus placeholder="correo@ucu.edu.uy">
      </label>
      <label>Contraseña
        <input type="password" name="contrasena" required placeholder="••••••••">
      </label>
      <button class="btn login-btn" type="submit">Ingresar</button>
    </form>

    <div class="login-hint">
      Admin: <code>admin@ucu.edu.uy</code> / <code>admin123</code>
    </div>
  </div>
</body>
</html>
